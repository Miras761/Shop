<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazaar — Объявления</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1d4ed8;--primary-dark:#1e3a8a;--primary-light:#3b82f6;
  --accent:#f97316;--danger:#ef4444;--success:#22c55e;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;
  --text:#0f172a;--text-muted:#64748b;--text-light:#94a3b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
  --shadow-lg:0 12px 40px rgba(0,0,0,.15);
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit}
input,textarea,select{font:inherit;border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;outline:none;transition:all .2s;background:#fff;color:var(--text);font-size:15px;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
textarea{resize:vertical;min-height:100px}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.header-inner{max-width:1320px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:20px;height:72px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.logo-icon{width:42px;height:42px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.logo-text{font-size:24px;font-weight:900;color:var(--primary);letter-spacing:-0.5px}
.search-bar{flex:1;max-width:620px;display:flex;background:var(--bg);border:2px solid var(--border);border-radius:50px;overflow:hidden;transition:all .2s}
.search-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:#fff}
.search-bar input{border:none;background:transparent;padding:12px 20px;flex:1;font-size:15px;box-shadow:none}
.search-bar input:focus{box-shadow:none;border:none}
.search-bar button{background:var(--primary);color:#fff;padding:10px 24px;margin:4px;border-radius:50px;font-weight:700;font-size:14px;transition:background .2s;white-space:nowrap;flex-shrink:0}
.search-bar button:hover{background:var(--primary-dark)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px;transition:all .18s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-outline{border:2px solid var(--border);color:var(--text);background:#fff}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:rgba(29,78,216,.04)}
.btn-post{background:var(--accent);color:#fff;padding:11px 20px;border-radius:10px;font-weight:800;font-size:14px}
.btn-post:hover{background:#ea6c10;transform:translateY(-1px);box-shadow:0 4px 12px rgba(249,115,22,.35)}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}

/* CATEGORIES */
.cats-nav{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats-nav::-webkit-scrollbar{display:none}
.cats-inner{max-width:1320px;margin:0 auto;padding:0 24px;display:flex;gap:4px;align-items:center;height:56px}
.cat-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:50px;cursor:pointer;font-size:14px;font-weight:700;color:var(--text-muted);white-space:nowrap;transition:all .18s;flex-shrink:0}
.cat-btn:hover{background:var(--bg);color:var(--text)}
.cat-btn.active{background:var(--primary);color:#fff}
.cat-emoji{font-size:18px}

/* LAYOUT */
.container{max-width:1320px;margin:0 auto;padding:0 24px}
.page{padding-top:32px;padding-bottom:48px}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 45%,#2563eb 75%,#3b82f6 100%);padding:72px 24px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.hero-inner{position:relative;max-width:700px;margin:0 auto}
.hero h1{font-size:clamp(34px,5vw,58px);font-weight:900;color:#fff;letter-spacing:-1.5px;line-height:1.1;margin-bottom:14px}
.hero h1 span{color:#fed7aa}
.hero p{font-size:18px;color:rgba(255,255,255,.8);margin-bottom:36px;font-weight:500}
.hero-search{display:flex;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);max-width:600px;margin:0 auto}
.hero-search input{border:none;padding:18px 24px;font-size:16px;flex:1;background:transparent}
.hero-search input:focus{box-shadow:none;border:none}
.hero-search button{background:var(--accent);color:#fff;padding:18px 32px;font-size:16px;font-weight:800;transition:background .2s;flex-shrink:0}
.hero-search button:hover{background:#ea6c10}
.hero-stats{display:flex;justify-content:center;gap:48px;margin-top:40px;color:rgba(255,255,255,.7);font-size:14px;font-weight:600}
.hero-stats strong{color:#fff;font-size:22px;font-weight:900;display:block;margin-bottom:2px}

/* FILTERS */
.filters-bar{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-bottom:28px;box-shadow:var(--shadow)}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group label{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{min-width:150px;padding:9px 14px;font-size:14px;border-radius:8px;border:2px solid var(--border)}
.price-range{display:flex;align-items:center;gap:8px}
.price-range input{width:110px;min-width:unset}
.price-range span{color:var(--text-muted);font-weight:700}
.results-count{margin-left:auto;font-size:14px;color:var(--text-muted);font-weight:600;align-self:center}
.results-count strong{color:var(--primary);font-size:17px}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-title{font-size:22px;font-weight:800;letter-spacing:-0.3px}

/* LISTINGS GRID */
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}

/* CARD */
.card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .22s;box-shadow:var(--shadow);position:relative;border:1px solid var(--border)}
.card:hover{transform:translateY(-5px);box-shadow:var(--shadow-lg);border-color:transparent}
.card-img{aspect-ratio:4/3;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:52px;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.card:hover .card-img img{transform:scale(1.05)}
.badge-condition{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.95);color:var(--text);padding:4px 10px;border-radius:50px;font-size:11px;font-weight:800;letter-spacing:.3px;backdrop-filter:blur(4px)}
.fav-btn{position:absolute;top:10px;right:10px;width:36px;height:36px;background:rgba(255,255,255,.92);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;backdrop-filter:blur(4px);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.fav-btn:hover{transform:scale(1.18)}
.fav-btn.active{background:#fff0f0}
.card-body{padding:16px}
.card-price{font-size:22px;font-weight:900;color:var(--primary);letter-spacing:-0.5px;margin-bottom:4px}
.card-price.negotiable::after{content:' · Торг';font-size:12px;font-weight:700;color:var(--success)}
.card-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-light);font-weight:500}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:40px}
.page-btn{width:42px;height:42px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:14px;font-weight:700;color:var(--text);transition:all .18s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--text-muted)}
.empty-state .emoji{font-size:64px;margin-bottom:16px}
.empty-state h3{font-size:22px;font-weight:800;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:15px}

/* DETAIL PAGE */
.detail-layout{display:grid;grid-template-columns:1fr 380px;gap:28px;align-items:start}
.gallery{background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow)}
.gallery-main{aspect-ratio:4/3;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:80px;overflow:hidden}
.gallery-main img{width:100%;height:100%;object-fit:cover}
.gallery-thumbs{display:flex;gap:8px;padding:12px;overflow-x:auto;background:var(--bg);border-top:1px solid var(--border)}
.gallery-thumb{width:68px;height:52px;object-fit:cover;border-radius:8px;cursor:pointer;opacity:.6;transition:all .18s;border:2px solid transparent;flex-shrink:0}
.gallery-thumb:hover{opacity:1}
.gallery-thumb.active{opacity:1;border-color:var(--primary)}
.detail-info-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:20px;box-shadow:var(--shadow)}
.detail-price{font-size:40px;font-weight:900;color:var(--primary);letter-spacing:-1px;line-height:1;margin-bottom:8px}
.detail-title{font-size:26px;font-weight:800;margin-bottom:16px;letter-spacing:-0.3px}
.detail-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.badge{padding:5px 13px;border-radius:50px;font-size:13px;font-weight:700}
.badge-blue{background:#dbeafe;color:var(--primary)}
.badge-green{background:#dcfce7;color:#15803d}
.badge-orange{background:#fed7aa;color:#c2410c}
.detail-desc{font-size:15px;line-height:1.75;color:var(--text);white-space:pre-line}
.detail-info-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bg);font-size:14px}
.detail-info-row .label{color:var(--text-muted);font-weight:600}
.detail-info-row:last-child{border-bottom:none}

/* SELLER CARD */
.seller-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:sticky;top:88px}
.seller-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.seller-avatar{width:64px;height:64px;border-radius:16px;background:var(--primary);color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.seller-avatar img{width:100%;height:100%;object-fit:cover}
.seller-name{font-size:17px;font-weight:800;margin-bottom:3px}
.seller-since{font-size:13px;color:var(--text-muted);margin-bottom:6px}
.seller-rating{display:flex;align-items:center;gap:6px;font-size:14px}
.stars{color:#f59e0b;font-size:16px;letter-spacing:1px}
.contact-actions{display:flex;flex-direction:column;gap:10px}
.btn-contact{width:100%;justify-content:center;padding:14px;font-size:15px;border-radius:12px;font-weight:700}
.phone-reveal{background:#dcfce7;border:2px solid #86efac;color:#15803d;border-radius:12px;padding:14px;text-align:center;font-weight:800;font-size:17px;letter-spacing:1px}
.safety-note{text-align:center;font-size:12px;color:var(--text-muted);margin-top:16px;line-height:1.6}

/* POST FORM */
.post-form{max-width:720px;margin:0 auto;background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:40px;box-shadow:var(--shadow-md)}
.post-form h1{font-size:28px;font-weight:900;margin-bottom:28px;letter-spacing:-0.5px}
.form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.form-group label{font-size:14px;font-weight:700;color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:12px 0}
.checkbox-row input[type="checkbox"]{width:20px;height:20px;border-radius:6px;accent-color:var(--primary);flex-shrink:0;padding:0}
.image-upload-area{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg)}
.image-upload-area:hover{border-color:var(--primary);background:#eff6ff}
.image-upload-area input{display:none}
.img-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.img-preview{width:90px;height:70px;object-fit:cover;border-radius:10px;border:2px solid var(--border)}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));padding:48px 0 40px;color:#fff}
.profile-info{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.profile-avatar{width:88px;height:88px;border-radius:20px;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border:3px solid rgba(255,255,255,.3)}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:28px;font-weight:900;letter-spacing:-0.5px;margin-bottom:10px}
.profile-stats{display:flex;flex-wrap:wrap;gap:20px}
.profile-stat{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;opacity:.85}
.page-tabs{display:flex;gap:4px;margin-bottom:28px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:6px;box-shadow:var(--shadow);width:fit-content;overflow-x:auto}
.page-tab{padding:10px 20px;border-radius:var(--radius-sm);cursor:pointer;font-size:14px;font-weight:700;color:var(--text-muted);transition:all .18s;white-space:nowrap}
.page-tab:hover{color:var(--text);background:var(--bg)}
.page-tab.active{background:var(--primary);color:#fff}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:var(--radius-lg);padding:36px;width:100%;max-width:460px;position:relative;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h2{font-size:22px;font-weight:900;margin-bottom:20px;letter-spacing:-0.3px}
.modal-close{position:absolute;top:18px;right:18px;width:34px;height:34px;background:var(--bg);border-radius:50%;font-size:16px;color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all .18s}
.modal-close:hover{background:var(--border);color:var(--text)}
.tab-btns{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border-radius:8px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--text-muted)}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{background:#fff;color:var(--primary);box-shadow:var(--shadow)}

/* TOAST */
.toast-container{position:fixed;bottom:28px;right:28px;z-index:1000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:#1e293b;color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:toastIn .25s ease;border-left:4px solid var(--primary-light);max-width:320px}
.toast.success{border-color:var(--success)}
.toast.error{background:#450a0a;border-color:var(--danger)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* CHAT */
.chat-layout{display:grid;grid-template-columns:360px 1fr;gap:0;height:calc(100vh - 200px);min-height:480px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-md)}
.dialogs-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.dialogs-header{padding:20px;border-bottom:1px solid var(--border);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:space-between;background:#fff}
.dialogs-list{overflow-y:auto;flex:1}
.dialog-item{display:flex;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.dialog-item:hover{background:#fff}
.dialog-item.active{background:#eff6ff;border-left:3px solid var(--primary)}
.dialog-avatar{width:48px;height:48px;border-radius:14px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;overflow:hidden}
.dialog-avatar img{width:100%;height:100%;object-fit:cover}
.dialog-info{flex:1;min-width:0}
.dialog-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dialog-last{font-size:12px;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px}
.dialog-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.dialog-time{font-size:11px;color:var(--text-light)}
.unread-badge{background:var(--primary);color:#fff;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:800}
.chat-window{display:flex;flex-direction:column;overflow:hidden}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:#fff}
.chat-user-name{font-weight:800;font-size:15px}
.chat-user-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:10px;background:#f8fafc}
.msg-row{display:flex;gap:8px;max-width:70%}
.msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-row.theirs{align-self:flex-start}
.msg-avatar{width:32px;height:32px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;overflow:hidden;align-self:flex-end}
.msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg-row.mine .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg-row.theirs .msg-bubble{background:#fff;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.5;margin-top:4px;text-align:right}
.msg-image{max-width:220px;border-radius:12px;cursor:pointer;display:block;margin-top:4px}
.msg-date-divider{text-align:center;font-size:11px;color:var(--text-muted);margin:8px 0;align-self:center;background:var(--border);padding:3px 14px;border-radius:20px;font-weight:600}
.chat-input-area{padding:14px 16px;border-top:1px solid var(--border);background:#fff;display:flex;gap:10px;align-items:flex-end}
.chat-input-wrap{flex:1;position:relative}
.chat-input{width:100%;border:2px solid var(--border);border-radius:14px;padding:11px 48px 11px 16px;font-size:14px;resize:none;max-height:120px;min-height:46px;overflow-y:auto;transition:border-color .2s}
.chat-input:focus{border-color:var(--primary);outline:none;box-shadow:none}
.chat-attach-btn{position:absolute;right:14px;bottom:12px;font-size:18px;color:var(--text-muted);cursor:pointer;transition:color .15s}
.chat-attach-btn:hover{color:var(--primary)}
.chat-send-btn{width:46px;height:46px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .2s}
.chat-send-btn:hover{background:var(--primary-dark);transform:scale(1.05)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:14px}
.img-preview-strip{display:flex;gap:8px;padding:10px 16px;background:var(--bg);border-top:1px solid var(--border)}
.img-preview-chip{position:relative;display:inline-block}
.img-preview-chip img{width:64px;height:52px;object-fit:cover;border-radius:10px}
.img-preview-chip .remove-img{position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border-radius:50%;width:20px;height:20px;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.notif-bell{position:relative;color:var(--text);font-size:20px;cursor:pointer;padding:8px;border-radius:10px;transition:background .18s}
.notif-bell:hover{background:var(--bg)}
.notif-dot{position:absolute;top:4px;right:4px;background:var(--danger);color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff}
.notif-dropdown{position:absolute;top:68px;right:0;width:360px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:300;max-height:440px;overflow-y:auto}
.notif-header{padding:16px 18px;font-weight:800;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:15px}
.notif-item{padding:14px 18px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{background:#eff6ff;border-left:3px solid var(--primary)}
.notif-text{font-weight:600;margin-bottom:3px}
.notif-time{font-size:11px;color:var(--text-muted)}

/* RESPONSIVE */
@media(max-width:1024px){.detail-layout{grid-template-columns:1fr}.seller-card{position:static}}
@media(max-width:768px){
  .header-inner{padding:0 16px;gap:10px}
  .logo-text{font-size:19px}
  .hero{padding:48px 16px}
  .hero h1{font-size:30px}
  .hero-stats{display:none}
  .container{padding:0 16px}
  .listings-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card-price{font-size:18px}
  .post-form{padding:24px 18px}
  .form-row{grid-template-columns:1fr}
  .chat-layout{grid-template-columns:1fr}
  .notif-dropdown{width:300px}
}
@media(max-width:480px){
  .hero-search{flex-direction:column;border-radius:12px}
  .hero-search button{border-radius:0 0 12px 12px}
  .page-tabs{width:100%}
  .profile-name{font-size:22px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="navigate('home')">
      <div class="logo-icon">🛍️</div>
      <span class="logo-text">Bazaar</span>
    </div>
    <div class="search-bar">
      <input type="text" id="header-search" placeholder="Поиск по объявлениям..." onkeypress="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">🔍 Найти</button>
    </div>
    <div class="header-actions" id="header-actions"></div>
  </div>
</header>

<nav class="cats-nav" id="cats-nav" style="display:none">
  <div class="cats-inner" id="cats-inner"></div>
</nav>

<main id="app"></main>
<div class="toast-container" id="toasts"></div>

<script>
// ==========================================
// STATE & CONFIG
// ==========================================
const API = '/api';
let state = {
    user: null,
    token: localStorage.getItem('token'),
    page: 'home',
    listings: [],
    categories: [],
    currentListing: null,
    filters: { search: '', category: '', min_price: '', max_price: '', condition: '' },
    pagination: { count: 0, next: null, previous: null, current: 1 },
    activeCategory: null,
    dialogs: [],
    activeDialog: null,
    chatMessages: [],
    unreadCount: 0,
    chatImages: [],
};

// ==========================================
// UTILITIES
// ==========================================
const $ = id => document.getElementById(id);
const app = () => $('app');

function formatPrice(price) {
    return new Intl.NumberFormat('ru-RU').format(price) + ' ₽';
}

function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr);
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'только что';
    if (m < 60) return `${m} мин. назад`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h} ч. назад`;
    const d = Math.floor(h / 24);
    if (d < 30) return `${d} дн. назад`;
    return new Date(dateStr).toLocaleDateString('ru-RU');
}

function getInitials(name) {
    return name ? name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) : '?';
}

function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    $('toasts').appendChild(el);
    setTimeout(() => el.remove(), 3500);
}

async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json' };
    if (state.token) headers['Authorization'] = `Token ${state.token}`;
    if (opts.body instanceof FormData) delete headers['Content-Type'];
    const res = await fetch(API + path, {
        ...opts,
        headers: { ...headers, ...(opts.headers || {}) },
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw data;
    return data;
}

function navigate(page, params = {}) {
    state.page = page;
    state.pageParams = params;
    render();
    window.scrollTo(0, 0);
}

// ==========================================
// AUTH
// ==========================================
async function checkAuth() {
    if (!state.token) return;
    try {
        state.user = await api('/auth/profile/');
    } catch {
        state.token = null;
        localStorage.removeItem('token');
    }
}

function showAuthModal(tab = 'login') {
    renderModal(`
        <div class="tab-btns">
            <div class="tab-btn ${tab === 'login' ? 'active' : ''}" onclick="showAuthModal('login')">Войти</div>
            <div class="tab-btn ${tab === 'register' ? 'active' : ''}" onclick="showAuthModal('register')">Регистрация</div>
        </div>
        ${tab === 'login' ? loginForm() : registerForm()}
    `);
}

function loginForm() {
    return `
        <div class="form-group"><label>Логин</label><input id="a-username" placeholder="Ваш логин"></div>
        <div class="form-group"><label>Пароль</label><input id="a-password" type="password" placeholder="Пароль" onkeypress="if(event.key==='Enter')doLogin()"></div>
        <button class="btn btn-primary" style="width:100%;padding:13px;font-size:16px;margin-top:8px;justify-content:center" onclick="doLogin()">Войти</button>
        <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">Нет аккаунта? <a href="#" onclick="showAuthModal('register')" style="color:var(--primary);font-weight:700">Зарегистрироваться</a></p>
    `;
}

function registerForm() {
    return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group"><label>Имя</label><input id="r-first" placeholder="Имя"></div>
            <div class="form-group"><label>Фамилия</label><input id="r-last" placeholder="Фамилия"></div>
        </div>
        <div class="form-group"><label>Логин *</label><input id="r-username" placeholder="Уникальный логин"></div>
        <div class="form-group"><label>Email *</label><input id="r-email" type="email" placeholder="email@example.com"></div>
        <div class="form-group"><label>Телефон</label><input id="r-phone" placeholder="+7 (999) 999-99-99"></div>
        <div class="form-group"><label>Город</label><input id="r-city" placeholder="Ваш город"></div>
        <div class="form-group"><label>Пароль *</label><input id="r-pass" type="password" placeholder="Минимум 6 символов"></div>
        <div class="form-group"><label>Повторите пароль *</label><input id="r-pass2" type="password" placeholder="Повторите пароль"></div>
        <button class="btn btn-primary" style="width:100%;padding:13px;font-size:16px;margin-top:8px;justify-content:center" onclick="doRegister()">Создать аккаунт</button>
    `;
}

async function doLogin() {
    try {
        const data = await api('/auth/login/', {
            method: 'POST',
            body: JSON.stringify({
                username: $('a-username').value,
                password: $('a-password').value,
            }),
        });
        state.token = data.token;
        state.user = data.user;
        localStorage.setItem('token', data.token);
        closeModal();
        toast('Добро пожаловать, ' + (data.user.first_name || data.user.username) + '!', 'success');
        renderHeader();
    } catch (e) {
        toast(e.non_field_errors?.[0] || 'Ошибка входа', 'error');
    }
}

async function doRegister() {
    try {
        const data = await api('/auth/register/', {
            method: 'POST',
            body: JSON.stringify({
                username: $('r-username').value,
                email: $('r-email').value,
                password: $('r-pass').value,
                password2: $('r-pass2').value,
                first_name: $('r-first').value,
                last_name: $('r-last').value,
                phone: $('r-phone').value,
                city: $('r-city').value,
            }),
        });
        state.token = data.token;
        state.user = data.user;
        localStorage.setItem('token', data.token);
        closeModal();
        toast('Аккаунт создан!', 'success');
        renderHeader();
    } catch (e) {
        const msg = Object.values(e)[0]?.[0] || 'Ошибка регистрации';
        toast(msg, 'error');
    }
}

async function doLogout() {
    try { await api('/auth/logout/', { method: 'POST' }); } catch {}
    state.token = null;
    state.user = null;
    localStorage.removeItem('token');
    toast('Вы вышли из системы');
    renderHeader();
    navigate('home');
}

// ==========================================
// CATEGORIES
// ==========================================
async function loadCategories() {
    try {
        const data = await api('/categories/');
        state.categories = Array.isArray(data) ? data : (data.results || []);
        renderCatsNav();
    } catch {}
}

function renderCatsNav() {
    const nav = $('cats-nav');
    const inner = $('cats-inner');
    nav.style.display = 'block';
    inner.innerHTML = `
        <div class="cat-btn ${!state.activeCategory ? 'active' : ''}" onclick="filterByCategory(null)">
            <span class="cat-emoji">🏠</span>
            <span>Все</span>
        </div>
        ${state.categories.map(c => `
            <div class="cat-btn ${state.activeCategory === c.id ? 'active' : ''}" onclick="filterByCategory(${c.id})">
                <span class="cat-emoji">${c.icon || '📦'}</span>
                <span>${c.name}</span>
            </div>
        `).join('')}
    `;
}

function filterByCategory(id) {
    state.activeCategory = id;
    state.filters.category = id || '';
    state.pagination.current = 1;
    renderCatsNav();
    if (state.page !== 'home') navigate('home');
    else loadListings();
}

// ==========================================
// LISTINGS
// ==========================================
async function loadListings(page = 1) {
    const f = state.filters;
    const params = new URLSearchParams({
        page,
        ...(f.search && { search: f.search }),
        ...(f.category && { category: f.category }),
        ...(f.min_price && { min_price: f.min_price }),
        ...(f.max_price && { max_price: f.max_price }),
        ...(f.condition && { condition: f.condition }),
        ...(f.ordering && { ordering: f.ordering }),
    });
    try {
        const data = await api('/listings/?' + params);
        state.listings = data.results;
        state.pagination = {
            count: data.count,
            next: data.next,
            previous: data.previous,
            current: page,
        };
        if (state.page === 'home') renderHome();
        return data;
    } catch { toast('Ошибка загрузки объявлений', 'error'); }
}

async function loadListing(id) {
    try {
        const data = await api(`/listings/${id}/`);
        state.currentListing = data;
        renderDetail();
    } catch { toast('Объявление не найдено', 'error'); }
}

async function toggleFavorite(id, e) {
    e && e.stopPropagation();
    if (!state.user) { showAuthModal(); return; }
    try {
        const r = await api(`/listings/${id}/favorite/`, { method: 'POST' });
        toast(r.status === 'added' ? '❤️ Добавлено в избранное' : '🤍 Убрано из избранного');
        loadListings(state.pagination.current);
    } catch { toast('Ошибка', 'error'); }
}

function doSearch() {
    const q = $('header-search')?.value || '';
    state.filters.search = q;
    state.pagination.current = 1;
    navigate('home');
    loadListings();
}

// ==========================================
// RENDER HEADER
// ==========================================
function renderHeader() {
    const el = $('header-actions');
    if (state.user) {
        const unread = state.unreadCount;
        el.innerHTML = `
            <button class="btn btn-post" onclick="navigate('post')">+ Подать объявление</button>
            <button class="btn btn-outline" onclick="showSupportModal()" style="font-size:13px">🆘 Поддержка</button>
            <div class="notif-bell" onclick="toggleNotifDropdown()" title="Уведомления" id="notif-bell">
                🔔
                ${unread > 0 ? `<div class="notif-dot">${unread > 9 ? '9+' : unread}</div>` : ''}
            </div>
            <button class="btn btn-outline" onclick="navigate('chat')" title="Чат" style="position:relative">
                💬
                ${state.unreadMessages > 0 ? `<span style="position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center">${state.unreadMessages}</span>` : ''}
            </button>
            <button class="btn btn-outline" onclick="navigate('profile')">
                <div style="width:28px;height:28px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0">
                    ${getInitials((state.user.first_name || '') + ' ' + (state.user.last_name || ''))}
                </div>
                <span style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${state.user.username}</span>
            </button>
        `;
    } else {
        el.innerHTML = `
            <button class="btn btn-outline" onclick="showAuthModal('login')">Войти</button>
            <button class="btn btn-outline" onclick="showSupportModal()" style="font-size:13px">🆘 Поддержка</button>
            <button class="btn btn-post" onclick="navigate('post')">+ Подать объявление</button>
        `;
    }
}

// ==========================================
// RENDER PAGES
// ==========================================
function render() {
    switch (state.page) {
        case 'home': renderHome(); break;
        case 'detail': renderDetail(); break;
        case 'post': renderPostForm(); break;
        case 'profile': renderProfile(); break;
        case 'chat': renderChat(); break;
        default: renderHome();
    }
}

// HOME PAGE
function renderHome() {
    const { listings, pagination } = state;
    const totalPages = Math.ceil(pagination.count / 20);

    app().innerHTML = `
        ${!state.activeCategory && !state.filters.search ? `
        <div class="hero">
            <div class="hero-inner">
                <h1>Найди нужное,<br><span>продай лишнее</span></h1>
                <p>Миллионы объявлений — всегда рядом</p>
                <div class="hero-search">
                    <input type="text" placeholder="Что ищете?" id="hero-q" value="${state.filters.search}" onkeypress="if(event.key==='Enter'){state.filters.search=this.value;loadListings()}">
                    <button onclick="state.filters.search=$('hero-q').value;loadListings()">🔍 Найти</button>
                </div>
                <div class="hero-stats">
                    <div><strong>${pagination.count > 0 ? pagination.count + '+' : '0'}</strong>объявлений</div>
                    <div><strong>${state.categories.length || 0}</strong>категорий</div>
                    <div><strong>Бесплатно</strong>размещение</div>
                </div>
            </div>
        </div>
        ` : ''}

        <div class="container page">
            <div class="filters-bar">
                <div class="filter-group">
                    <label>Состояние</label>
                    <select onchange="state.filters.condition=this.value;loadListings()">
                        <option value="">Любое</option>
                        <option value="new" ${state.filters.condition==='new'?'selected':''}>Новое</option>
                        <option value="used" ${state.filters.condition==='used'?'selected':''}>Б/У</option>
                        <option value="damaged" ${state.filters.condition==='damaged'?'selected':''}>Требует ремонта</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Цена</label>
                    <div class="price-range">
                        <input type="number" placeholder="От" value="${state.filters.min_price}" onchange="state.filters.min_price=this.value;loadListings()" style="width:100px;min-width:unset">
                        <span>—</span>
                        <input type="number" placeholder="До" value="${state.filters.max_price}" onchange="state.filters.max_price=this.value;loadListings()" style="width:100px;min-width:unset">
                    </div>
                </div>
                <div class="filter-group">
                    <label>Сортировка</label>
                    <select onchange="state.filters.ordering=this.value;loadListings()">
                        <option value="-created_at">Новые сначала</option>
                        <option value="price">Дешевле сначала</option>
                        <option value="-price">Дороже сначала</option>
                        <option value="-views_count">Популярные</option>
                    </select>
                </div>
                <div class="results-count">Найдено: <strong>${pagination.count}</strong></div>
            </div>

            <div class="section-header">
                <h2 class="section-title">
                    ${state.filters.search ? `Результаты для «${state.filters.search}»` : state.activeCategory ? state.categories.find(c=>c.id===state.activeCategory)?.name || 'Объявления' : 'Свежие объявления'}
                </h2>
            </div>

            ${listings.length === 0 ? `
                <div class="empty-state">
                    <div class="emoji">🔍</div>
                    <h3>Ничего не найдено</h3>
                    <p>Попробуйте изменить параметры поиска</p>
                </div>
            ` : `
                <div class="listings-grid">
                    ${listings.map(l => renderCard(l)).join('')}
                </div>
            `}

            ${totalPages > 1 ? `
                <div class="pagination">
                    ${Array.from({length: Math.min(totalPages, 7)}, (_, i) => i + 1).map(p => `
                        <button class="page-btn ${p === pagination.current ? 'active' : ''}" onclick="loadListings(${p})">${p}</button>
                    `).join('')}
                    ${totalPages > 7 ? `<span style="display:flex;align-items:center;color:var(--text-muted);font-weight:700">... ${totalPages}</span>` : ''}
                </div>
            ` : ''}
        </div>
    `;
}

function renderCard(l) {
    const condLabels = { new: 'Новое', used: 'Б/У', damaged: 'Ремонт' };
    return `
        <div class="card" onclick="navigate('detail');loadListing(${l.id})">
            <div class="card-img">
                ${l.main_image ? `<img src="${l.main_image}" alt="${l.title}" loading="lazy">` : '<span style="font-size:52px">📦</span>'}
            </div>
            <span class="badge-condition">${condLabels[l.condition] || 'Б/У'}</span>
            <button class="fav-btn ${l.is_favorite ? 'active' : ''}" onclick="toggleFavorite(${l.id}, event)" title="${l.is_favorite ? 'Убрать из избранного' : 'В избранное'}">
                ${l.is_favorite ? '❤️' : '🤍'}
            </button>
            <div class="card-body">
                <div class="card-price ${l.is_negotiable ? 'negotiable' : ''}">${formatPrice(l.price)}</div>
                <div class="card-title">${l.title}</div>
                <div class="card-meta">
                    <span>📍 ${l.city || l.seller_city || 'Россия'}</span>
                    <span>${timeAgo(l.created_at)}</span>
                </div>
            </div>
        </div>
    `;
}

// DETAIL PAGE
function renderDetail() {
    const l = state.currentListing;
    if (!l) {
        app().innerHTML = `<div class="container page"><div class="empty-state"><div class="emoji">🔄</div><h3>Загрузка...</h3></div></div>`;
        return;
    }

    const condLabels = { new: 'Новое', used: 'Б/У', damaged: 'Требует ремонта' };
    const imgs = l.images || [];

    app().innerHTML = `
        <div class="container page">
            <div style="font-size:14px;color:var(--text-muted);margin-bottom:20px;display:flex;align-items:center;gap:6px;font-weight:500">
                <a href="#" onclick="navigate('home');loadListings()" style="color:var(--primary);font-weight:700">← Назад</a>
                ${l.category ? `<span>/</span><span>${l.category.name}</span>` : ''}
            </div>

            <div class="detail-layout">
                <div>
                    <div class="gallery">
                        <div class="gallery-main" id="gallery-main">
                            ${imgs.length > 0
                                ? `<img id="main-img" src="${imgs[0].image_url}" alt="${l.title}">`
                                : '<span style="font-size:80px">📦</span>'
                            }
                        </div>
                        ${imgs.length > 1 ? `
                        <div class="gallery-thumbs">
                            ${imgs.map((img, i) => `
                                <img class="gallery-thumb ${i === 0 ? 'active' : ''}" src="${img.image_url}"
                                     onclick="selectThumb(this,'${img.image_url}')">
                            `).join('')}
                        </div>
                        ` : ''}
                    </div>

                    <div class="detail-info-card">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px">
                            <div>
                                <div class="detail-price">${formatPrice(l.price)} ${l.is_negotiable ? '<span style="font-size:16px;color:var(--success);font-weight:700"> · Торг</span>' : ''}</div>
                                <h1 class="detail-title">${l.title}</h1>
                            </div>
                            <button class="btn ${l.is_favorite ? 'btn-danger' : 'btn-outline'}" onclick="toggleFavorite(${l.id})">
                                ${l.is_favorite ? '❤️ В избранном' : '🤍 В избранное'}
                            </button>
                        </div>

        img.src = URL.createObjectURL(file);
        container.appendChild(img);
    });
}

async function submitListing() {
    const formData = new FormData();
    const fields = {
        title: $('p-title')?.value,
        description: $('p-desc')?.value,
        price: $('p-price')?.value,
        city: $('p-city')?.value,
        condition: $('p-condition')?.value,
        is_negotiable: $('p-negotiable')?.checked,
    };
    const catId = $('p-category')?.value;
    if (!fields.title || !fields.price) { toast('Заполните обязательные поля', 'error'); return; }
    if (catId) formData.append('category_id', catId);
    Object.entries(fields).forEach(([k, v]) => formData.append(k, v));
    const imgs = $('p-images')?.files;
    if (imgs) Array.from(imgs).forEach(f => formData.append('images', f));
    try {
        const listing = await api('/listings/create/', {
            method: 'POST',
            body: formData,
            headers: { Authorization: `Token ${state.token}` },
        });
        toast('🎉 Объявление опубликовано!', 'success');
        navigate('detail');
        loadListing(listing.id);
    } catch (e) {
        const msg = Object.values(e)[0]?.[0] || 'Ошибка публикации';
        toast(msg, 'error');
    }
}

function renderModal(html) {
    let backdrop = $('modal-backdrop');
    if (!backdrop) {
        backdrop = document.createElement('div');
        backdrop.id = 'modal-backdrop';
        backdrop.className = 'modal-backdrop';
        backdrop.onclick = e => { if (e.target === backdrop) closeModal(); };
        document.body.appendChild(backdrop);
    }
    backdrop.innerHTML = `
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            ${html}
        </div>
    `;
    backdrop.style.display = 'flex';
}

function closeModal() {
    const m = $('modal-backdrop');
    if (m) m.style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function loadUnreadCount() {
    if (!state.user) return;
    try {
        const data = await api('/chat/unread/');
        state.unreadCount = data.unread_notifications || 0;
        state.unreadMessages = data.unread_messages || 0;
        const bell = $('notif-bell');
        if (bell) {
            const dot = bell.querySelector('.notif-dot');
            if (state.unreadCount > 0) {
                if (dot) dot.textContent = state.unreadCount > 9 ? '9+' : state.unreadCount;
                else bell.insertAdjacentHTML('beforeend', `<div class="notif-dot">${state.unreadCount > 9 ? '9+' : state.unreadCount}</div>`);
            } else if (dot) dot.remove();
        }
    } catch {}
}

async function toggleNotifDropdown() {
    let dropdown = $('notif-dropdown');
    if (dropdown) { dropdown.remove(); return; }
    try {
        const data = await api('/chat/notifications/');
        const notifs = Array.isArray(data) ? data : (data.results || []);
        const bell = $('notif-bell');
        const html = `
            <div id="notif-dropdown" class="notif-dropdown">
                <div class="notif-header">
                    <span>🔔 Уведомления</span>
                    <button class="btn btn-sm" style="font-size:11px;color:var(--text-muted)" onclick="markAllNotifRead()">Прочитать все</button>
                </div>
                ${notifs.length === 0 ? '<div style="padding:28px;text-align:center;color:var(--text-muted)">Нет уведомлений</div>' :
                    notifs.map(n => `
                        <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="openNotif(${n.dialog || 0})">
                            <div class="notif-text">${n.type === 'message' ? '💬' : '🔔'} ${n.text}</div>
                            <div class="notif-time">${timeAgo(n.created_at)}</div>
                        </div>
                    `).join('')
                }
            </div>
        `;
        bell.style.position = 'relative';
        bell.insertAdjacentHTML('afterend', html);
        setTimeout(() => document.addEventListener('click', function handler(e) {
            if (!$('notif-dropdown')?.contains(e.target) && e.target !== bell) {
                $('notif-dropdown')?.remove();
                document.removeEventListener('click', handler);
            }
        }), 100);
    } catch {}
}

async function markAllNotifRead() {
    try {
        await api('/chat/notifications/read/', { method: 'POST' });
        state.unreadCount = 0;
        $('notif-dropdown')?.remove();
        renderHeader();
    } catch {}
}

function openNotif(dialogId) {

function renderDialogsList() {
    const el = $('dialogs-list');
    if (!el) return;
    if (state.dialogs.length === 0) {
        el.innerHTML = `
            <div style="padding:36px 16px;text-align:center;color:var(--text-muted)">

            </div>
        `;
        return;
    }
    el.innerHTML = state.dialogs.map(d => {
        const u = d.other_user;
        const last = d.last_message;
        const isActive = state.activeDialog?.id === d.id;
        return `
            <div class="dialog-item ${isActive ? 'active' : ''}" onclick="openDialog(${d.id})">
                <div class="dialog-avatar">
                    ${u.avatar_url ? `<img src="${u.avatar_url}" alt="${u.name}">` : getInitials(u.name)}
                </div>

                    <div class="dialog-name">${u.name}</div>
                    <div class="dialog-last">
                        ${last ? (last.is_mine ? '✓ ' : '') + last.text : d.listing_title || 'Начните переписку'}
                    </div>
                </div>
                <div class="dialog-meta">
                    <div class="dialog-time">${last ? timeAgo(last.created_at) : ''}</div>
                    ${d.unread_count > 0 ? `<div class="unread-badge">${d.unread_count}</div>` : ''}
                </div>
            </div>
        `;
    }).join('');
}

async function openDialog(dialogId) {
    state.activeDialog = state.dialogs.find(d => d.id === dialogId);
    if (!state.activeDialog) {
        try {
            const data = await api('/chat/dialogs/');
            state.dialogs = Array.isArray(data) ? data : (data.results || []);
            state.activeDialog = state.dialogs.find(d => d.id === dialogId);
        } catch {}
    }
    renderDialogsList();
    renderChatWindow();
    await loadMessages(dialogId);
}

function renderChatWindow() {
    const d = state.activeDialog;
    const win = $('chat-window');
    if (!win || !d) return;
    const u = d.other_user;

    win.innerHTML = `
        <div class="chat-header">
            <div class="dialog-avatar" style="width:42px;height:42px;font-size:15px">
                ${u.avatar_url ? `<img src="${u.avatar_url}">` : getInitials(u.name)}
            </div>
            <div style="flex:1">
                <div class="chat-user-name">${u.name}</div>
                <div class="chat-user-sub">
                    ${u.phone ? `📞 ${u.phone}` : u.city ? `📍 ${u.city}` : ''}
                    ${u.rating ? ` · ⭐ ${u.rating}` : ''}
                </div>
            </div>
            ${d.listing_title ? `<div style="font-size:12px;color:var(--text-muted);max-width:130px;text-align:right;line-height:1.4">По объявлению:<br><strong style="color:var(--text)">${d.listing_title}</strong></div>` : ''}
        </div>
        <div class="chat-messages" id="chat-msgs">
            <div style="text-align:center;color:var(--text-muted);font-size:13px;padding:20px">Загрузка сообщений...</div>
        </div>
        <div id="img-strip-container"></div>
        <div class="chat-input-area">
            <div class="chat-input-wrap">
                <textarea class="chat-input" id="chat-text" placeholder="Написать сообщение..."
                    onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"
                    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
                <label class="chat-attach-btn" for="chat-file-input" title="Прикрепить фото">📎</label>
                <input type="file" id="chat-file-input" accept="image/*" multiple style="display:none" onchange="previewChatImages(this)">
            </div>
            <button class="chat-send-btn" onclick="sendChatMessage()" title="Отправить">➤</button>
        </div>
    `;
}

async function loadMessages(dialogId) {
    try {
        const data = await api(`/chat/dialogs/${dialogId}/messages/`);
        state.chatMessages = Array.isArray(data) ? data : (data.results || []);
        renderMessages();
        loadUnreadCount();
        renderDialogsList();
    } catch {}
}

function renderMessages() {
    const el = $('chat-msgs');
    if (!el) return;
    const msgs = state.chatMessages;

    if (msgs.length === 0) {
        el.innerHTML = `
            <div style="text-align:center;color:var(--text-muted);padding:40px 20px">
                <div style="font-size:44px;margin-bottom:10px">👋</div>
                <div style="font-weight:600">Начните переписку!</div>
            </div>
        `;
        return;
    }

    let html = '';
    let lastDate = '';

    msgs.forEach(msg => {
        const msgDate = new Date(msg.created_at).toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
        if (msgDate !== lastDate) {
            html += `<div class="msg-date-divider">${msgDate}</div>`;
            lastDate = msgDate;
        }
        const mine = msg.is_mine;
        const avatar = msg.sender_avatar
            ? `<img src="${msg.sender_avatar}">`
            : getInitials(msg.sender_name || '?');

        html += `
            <div class="msg-row ${mine ? 'mine' : 'theirs'}">
                ${!mine ? `<div class="msg-avatar">${avatar}</div>` : ''}
                <div>
                    <div class="msg-bubble">
                        ${msg.image_url ? `<img class="msg-image" src="${msg.image_url}" onclick="window.open('${msg.image_url}','_blank')" alt="фото">` : ''}
                        ${msg.text ? msg.text : ''}
                    </div>
                    <div class="msg-time">
                        ${new Date(msg.created_at).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}
                        ${mine ? (msg.is_read ? ' ✓✓' : ' ✓') : ''}
                    </div>
                </div>
                ${mine ? `<div class="msg-avatar">${avatar}</div>` : ''}
            </div>
        `;
    });

    el.innerHTML = html;
    el.scrollTop = el.scrollHeight;
}

function previewChatImages(input) {
    state.chatImages = Array.from(input.files);
    const container = $('img-strip-container');
    if (!container) return;
    if (state.chatImages.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = `
        <div class="img-preview-strip">
            ${state.chatImages.map((f, i) => `
                <div class="img-preview-chip">
                    <img src="${URL.createObjectURL(f)}" alt="фото">
                    <div class="remove-img" onclick="removeChatImage(${i})">✕</div>
                </div>
            `).join('')}
        </div>
    `;
}

function removeChatImage(idx) {
    state.chatImages.splice(idx, 1);
    const container = $('img-strip-container');
    if (state.chatImages.length === 0) { container.innerHTML = ''; return; }
    previewChatImages({ files: state.chatImages });
}

async function sendChatMessage() {
    if (!state.activeDialog) return;
    const text = $('chat-text')?.value?.trim() || '';
    const images = state.chatImages;
    if (!text && images.length === 0) return;
    const dialogId = state.activeDialog.id;
    try {
        if (images.length > 0) {
            for (const img of images) {
                const fd = new FormData();
                if (text) fd.append('text', text);
                fd.append('image', img);
                const msg = await apiFormData(`/chat/dialogs/${dialogId}/send/`, fd);
                state.chatMessages.push(msg);
            }
        } else {
            const fd = new FormData();
            fd.append('text', text);
            const msg = await apiFormData(`/chat/dialogs/${dialogId}/send/`, fd);
            state.chatMessages.push(msg);
        }
        if ($('chat-text')) $('chat-text').value = '';
        state.chatImages = [];
        const container = $('img-strip-container');
        if (container) container.innerHTML = '';
        const fileInput = $('chat-file-input');
        if (fileInput) fileInput.value = '';
        renderMessages();
        await loadDialogs();
    } catch(e) {
        toast('Ошибка отправки сообщения', 'error');
    }
}

async function apiFormData(path, formData) {
    const headers = {};
    if (state.token) headers['Authorization'] = `Token ${state.token}`;
    const res = await fetch(API + path, { method: 'POST', headers, body: formData });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw data;
    return data;
}

async function startChatWithSeller(sellerId, listingId) {
    if (!state.user) { showAuthModal(); return; }
    if (sellerId === state.user.id) { toast('Это ваше объявление', 'error'); return; }
    try {
        const dialog = await api('/chat/dialogs/start/', {
            method: 'POST',
            body: JSON.stringify({ recipient_id: sellerId, listing_id: listingId }),
        });
        state.activeDialog = dialog;
        if (!state.dialogs.find(d => d.id === dialog.id)) state.dialogs.unshift(dialog);
        navigate('chat');
        setTimeout(() => openDialog(dialog.id), 150);
    } catch(e) {
        toast(e.error || 'Ошибка', 'error');
    }
}

setInterval(async () => {
    if (state.user) {
        try { await api('/panel/update-seen/', { method: 'POST' }); } catch {}
    }
}, 120000);

setInterval(async () => {
    if (state.user) {
        await loadUnreadCount();
        if (state.page === 'chat' && state.activeDialog) {
            await loadMessages(state.activeDialog.id);
        } else if (state.page === 'chat') {
            await loadDialogs();
        }
    }
}, 8000);

// ==========================================
// SUPPORT
// ==========================================
function showSupportModal() {
    renderModal(`
        <h2>🆘 Поддержка</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:16px">Опишите проблему — администратор ответит вам в уведомлениях</p>
        <div class="form-group">
            <label>Тема *</label>
            <input id="sup-subject" placeholder="Кратко опишите проблему">
        </div>
        ${!state.user ? `<div class="form-group"><label>Email для ответа</label><input id="sup-email" type="email" placeholder="your@email.com"></div>` : ''}
        <div class="form-group">
            <label>Сообщение *</label>
            <textarea id="sup-message" style="height:120px" placeholder="Подробно опишите вашу проблему..."></textarea>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:13px;justify-content:center;font-size:15px" onclick="submitSupport()">
            📤 Отправить
        </button>
    `);
}

async function submitSupport() {
    const subject = $('sup-subject')?.value?.trim();
    const message = $('sup-message')?.value?.trim();
    const email = $('sup-email')?.value?.trim() || '';
    if (!subject || !message) { toast('Заполните все поля', 'error'); return; }
    try {
        await api('/panel/create-ticket/', {
            method: 'POST',
            body: JSON.stringify({ subject, message, email }),
        });
        closeModal();
        toast('✅ Обращение отправлено!', 'success');
    } catch { toast('Ошибка отправки', 'error'); }
}

async function loadGlobalAnnouncement() {
    try {
        const data = await api('/panel/announcement/');
        if (data.text) showAnnouncementBanner(data.text);
    } catch {}
}

function showAnnouncementBanner(text) {
    let banner = $('global-banner');
    if (!banner) {
        banner = document.createElement('div');
        banner.id = 'global-banner';
        banner.style.cssText = `background:linear-gradient(90deg,#1e3a8a,#1d4ed8);border-bottom:1px solid rgba(255,255,255,.1);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:#fff;position:sticky;top:72px;z-index:99;font-weight:600`;
        document.querySelector('.header').insertAdjacentElement('afterend', banner);
    }
    banner.innerHTML = `
        <span>📢 <strong>Объявление:</strong> ${text}</span>
        <button onclick="$('global-banner').remove()" style="background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;font-size:14px;padding:4px 12px;border-radius:8px;font-weight:700">✕</button>
    `;
}

// ==========================================
// INIT
// ==========================================
async function init() {
    await checkAuth();
    if (state.user) {
        await loadUnreadCount();
        try { await api('/panel/update-seen/', { method: 'POST' }); } catch {}
    }
    renderHeader();
    loadGlobalAnnouncement();
    await loadCategories();
    await loadListings();
    renderHome();
}

init();
</script>
